<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="description" content="{{ site.description | default: site.title }}">
    <title>{{ page.title | default: site.title }}</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">
    <link rel="apple-touch-icon" href="{{ '/assets/images/logo.svg' | relative_url }}">

    <!-- Fonts / icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">

    <!-- Custom styles -->
    <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">

    {% if site.github && site.github.url %}
      <link rel="canonical" href="{{ site.github.url }}">
    {% endif %}
  </head>
  <body>
    {% include masthead.html %}

    <main class="page__content" role="main">
      <div class="container">
        {{ content }}
      </div>
    </main>

    <footer class="site-footer">
      <p>© 2020–2026 Zakaria Izouaouen. All rights reserved.</p>
    </footer>
  </body>
</html>
