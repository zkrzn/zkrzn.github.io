<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <!-- Apply saved theme (or system preference) before CSS renders to prevent flash.
         Note: This intentionally duplicates the detection logic in theme-toggle.js;
         the inline script must be self-contained so it runs synchronously before any
         stylesheet is applied, preventing a flash of incorrect theme (FOIT). -->
    <script>try{var _t=localStorage.getItem('site-theme');if(_t==='light'||_t==='dark'){document.documentElement.setAttribute('data-theme',_t);}else{var _m=window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)');document.documentElement.setAttribute('data-theme',_m&&_m.matches?'light':'dark');}}catch(e){}</script>
    {% seo %}

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">
    <link rel="apple-touch-icon" href="{{ '/assets/images/logo.svg' | relative_url }}">

    <!-- Fonts / icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">

    <!-- Custom styles -->
    <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">

    {% if site.github and site.github.url %}
      <link rel="canonical" href="{{ site.github.url }}">
    {% endif %}
  </head>
  <body>
    {% include masthead.html %}

    <main class="page__content" role="main">
      <div class="container">
        {{ content }}
      </div>
    </main>

    <footer class="site-footer">
      <p>© 2020–2026 Zakaria Izouaouen. All rights reserved.</p>
    </footer>

    <script src="{{ '/assets/js/theme-toggle.js' | relative_url }}"></script>
  </body>
</html>
