---
layout: default
---

<article class="single-article">
  {% if page.title %}
    <h1 class="page-title">
      {% if page.icon %}<i class="{{ page.icon }}" aria-hidden="true"></i> {% endif %}{{ page.title }}
    </h1>
  {% endif %}

  <div class="article-content">
    {{ content }}
  </div>
</article>
